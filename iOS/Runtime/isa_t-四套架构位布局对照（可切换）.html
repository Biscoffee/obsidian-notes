<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>show_widget</title>
</head>
<body>
<style>
:root{
--accent:#E58522;--card-bg:#13131a;
--text-primary:rgba(255,255,255,.85);--text-secondary:rgba(255,255,255,.55);--text-tertiary:rgba(255,255,255,.4);
--intensity-6:rgba(255,255,255,.06);--intensity-8:rgba(255,255,255,.09);--intensity-12:rgba(255,255,255,.14);
font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif
}
@media (prefers-color-scheme:dark){
:root{
--card-bg:#2E2E2E;
--text-primary:rgba(255,255,255,.8);--text-secondary:rgba(255,255,255,.5);--text-tertiary:rgba(255,255,255,.35);
--intensity-6:rgba(255,255,255,.06);--intensity-8:rgba(255,255,255,.08);--intensity-12:rgba(255,255,255,.12);
}
}
*{box-sizing:border-box}
.arch-btn{height:34px;padding:0 12px;border:.5px solid var(--intensity-8);border-radius:10px;background:var(--intensity-6);color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer;transition:background .15s,color .15s,border-color .15s;white-space:nowrap}
.arch-btn.on{background:color-mix(in srgb,var(--accent) 18%,transparent);color:var(--accent);border-color:color-mix(in srgb,var(--accent) 24%,transparent)}
.isa-bit{transition:transform .15s,filter .15s;cursor:pointer}
.isa-row{cursor:pointer;transition:background .15s}
.isa-row:hover{background:var(--intensity-6)}
.isa-row.active{background:color-mix(in srgb,var(--accent) 14%,transparent)}
</style>
<div style="display:block;width:100%;color:var(--text-primary);">

  <div id="archTabs" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;"></div>
  <div id="archNote" style="font-size:12px;color:var(--text-secondary);line-height:1.5;margin-bottom:14px;"></div>

  <div id="isaBar" style="display:flex;width:100%;height:60px;border-radius:10px;overflow:hidden;border:.5px solid var(--intensity-12);margin-bottom:6px;"></div>
  <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-tertiary);margin-bottom:16px;">
    <span>bit 0（低位）</span><span>bit 高位</span>
  </div>

  <div id="isaDetail" style="border:.5px solid var(--intensity-8);border-radius:14px;background:var(--card-bg);padding:14px 16px;margin-bottom:16px;min-height:70px;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:7px;flex-wrap:wrap;">
      <span id="dName" style="font-size:15px;font-weight:600;"></span>
      <span id="dBits" style="height:20px;display:inline-flex;align-items:center;border-radius:999px;background:var(--intensity-6);color:var(--text-secondary);padding:0 10px;font-size:11px;font-weight:500;"></span>
    </div>
    <div id="dDesc" style="font-size:13px;color:var(--text-secondary);line-height:1.6;"></div>
  </div>

  <div id="isaList" style="display:flex;flex-direction:column;gap:4px;"></div>
</div>
<script>
const C={nonpointer:"#B9887D",has_assoc:"#E98B2A",has_cxx_dtor:"#00AA90",weakly_referenced:"#B481BB",
  shiftcls:"#E58522",shiftcls_and_sig:"#E58522",indexcls:"#F17C67",magic:"#86C166",unused:"#9aa0a6",
  has_sidetable_rc:"#FFB11B",extra_rc:"#58B2DC"};
const D={
  nonpointer:"非指针 isa 总开关。0 = 退化为纯类指针；1 = 启用，下面位域才生效。",
  has_assoc:"是否设置过关联对象。无则 dealloc 时跳过关联对象表清理。",
  has_cxx_dtor:"类/父类是否有 C++ 析构。无则释放时走更快路径。（arm64e 已移除，移到 cache flags）",
  weakly_referenced:"是否被 __weak 弱引用过。无则 dealloc 时跳过 weak 表清理。",
  shiftcls:"真正的类指针。因内存对齐、低位恒为 0 而可压缩，取类时位运算还原。",
  shiftcls_and_sig:"arm64e 专有：类指针 + PAC 指针签名合并存储，用于指针验证防篡改，代价是挤占了 extra_rc 位宽。",
  indexcls:"32 位平台专有：存的是类表索引（下标），而非类指针，靠查表找类。",
  magic:"调试期识别 isa 的魔数，供 Runtime / 调试器校验。（arm64e 已移除）",
  unused:"保留位，暂未使用。",
  has_sidetable_rc:"引用计数是否已溢出到外部 SideTable。",
  extra_rc:"内联存储的引用计数（retainCount − 1）。位宽越大，越不容易溢出到 SideTable。"
};
const archs={
  arm64e:{name:"① arm64e（真机 A12+/模拟器）",mask:"ISA_MASK = 0x007ffffffffffff8",
    note:"开启 PAC 指针验证：类指针与签名合并为 shiftcls_and_sig（52 bit）；移除了 has_cxx_dtor 与 magic；extra_rc 仅 8 bit。",
    f:[["nonpointer",1],["has_assoc",1],["weakly_referenced",1],["shiftcls_and_sig",52],["has_sidetable_rc",1],["extra_rc",8]]},
  arm64:{name:"② arm64（非 e）",mask:"ISA_MASK = 0x0000000ffffffff8",
    note:"经典布局：shiftcls 33 bit，保留 has_cxx_dtor 与 magic；extra_rc 高达 19 bit，四套中最阔绰。",
    f:[["nonpointer",1],["has_assoc",1],["has_cxx_dtor",1],["shiftcls",33],["magic",6],["weakly_referenced",1],["unused",1],["has_sidetable_rc",1],["extra_rc",19]]},
  x86_64:{name:"③ x86_64（Intel Mac）",mask:"ISA_MASK = 0x00007ffffffffff8",
    note:"Intel 平台：shiftcls 44 bit，保留 has_cxx_dtor 与 magic；extra_rc 仅 8 bit。",
    f:[["nonpointer",1],["has_assoc",1],["has_cxx_dtor",1],["shiftcls",44],["magic",6],["weakly_referenced",1],["unused",1],["has_sidetable_rc",1],["extra_rc",8]]},
  arm64_32:{name:"④ armv7k / arm64_32（Apple Watch）",mask:"32 位 · 索引式 isa",
    note:"32 位手表平台：存 indexcls 类表索引（15 bit）而非指针；extra_rc 仅 7 bit，最易溢出。",
    f:[["nonpointer",1],["has_assoc",1],["indexcls",15],["magic",4],["has_cxx_dtor",1],["weakly_referenced",1],["unused",1],["has_sidetable_rc",1],["extra_rc",7]]}
};
const order=["arm64e","arm64","x86_64","arm64_32"];
const tabs=document.getElementById('archTabs');
const note=document.getElementById('archNote');
const bar=document.getElementById('isaBar');
const list=document.getElementById('isaList');
const dName=document.getElementById('dName'),dBits=document.getElementById('dBits'),dDesc=document.getElementById('dDesc');
let curArch="arm64e",curField=null;

function selField(key){
  curField=key;
  dName.textContent=key;dName.style.color=C[key];
  const fd=archs[curArch].f.find(x=>x[0]===key);
  dBits.textContent=fd[1]+" bit";
  dDesc.textContent=D[key];
  [...bar.children].forEach(s=>{const on=s.dataset.key===key;s.style.filter=on?"none":"saturate(.55) opacity(.5)";s.style.transform=on?"translateY(-3px)":"none";});
  [...list.children].forEach(r=>r.classList.toggle('active',r.dataset.key===key));
}
function renderArch(){
  const a=archs[curArch];
  note.innerHTML="<b style='color:var(--text-primary)'>"+a.mask+"</b> · "+a.note;
  bar.innerHTML="";list.innerHTML="";
  a.f.forEach(([key,bits])=>{
    const seg=document.createElement('div');
    seg.className='isa-bit';seg.dataset.key=key;
    seg.style.cssText="flex:"+bits+" 1 0;background:"+C[key]+";min-width:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:600;border-right:1px solid rgba(255,255,255,.25);overflow:hidden;";
    seg.textContent=bits>=4?bits:"";
    seg.addEventListener('click',()=>selField(key));
    bar.appendChild(seg);
    const row=document.createElement('div');
    row.className='isa-row';row.dataset.key=key;
    row.style.cssText="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:.5px solid var(--intensity-8);";
    row.innerHTML="<span style='width:10px;height:10px;border-radius:3px;background:"+C[key]+";flex:none;'></span><span style='font-size:13px;font-weight:500;flex:1;min-width:0;'>"+key+"</span><span style='font-size:11px;color:var(--text-tertiary);'>"+bits+" bit</span>";
    row.addEventListener('click',()=>selField(key));
    list.appendChild(row);
  });
  const big=a.f.reduce((m,x)=>x[1]>m[1]?x:m);
  selField(big[0]);
}
order.forEach(k=>{
  const b=document.createElement('button');
  b.className='arch-btn'+(k===curArch?' on':'');
  b.textContent=archs[k].name;
  b.addEventListener('click',()=>{curArch=k;[...tabs.children].forEach((x,i)=>x.classList.toggle('on',order[i]===k));renderArch();});
  tabs.appendChild(b);
});
renderArch();
</script><script data-tabbit-widget-diagnostics="true">
(function(){
  if (window.__tabbitWidgetDiagnosticsInstalled) return;
  window.__tabbitWidgetDiagnosticsInstalled = true;
  window.__TABBIT_WIDGET_ERRORS__ = window.__TABBIT_WIDGET_ERRORS__ || [];
  function emit(level, args) {
    var payload = {
      type: "tabbit_widget_diagnostics",
      level: level,
      message: Array.prototype.slice.call(args || []).map(function(item) {
        if (item && item.stack) return item.stack;
        if (typeof item === "string") return item;
        try { return JSON.stringify(item); } catch (_) { return String(item); }
      }).join(" "),
      timestamp: Date.now()
    };
    window.__TABBIT_WIDGET_ERRORS__.push(payload);
    try { window.parent && window.parent.postMessage(payload, "*"); } catch (_) {}
  }
  var originalError = console.error;
  console.error = function() {
    emit("error", arguments);
    return originalError && originalError.apply(console, arguments);
  };
  window.addEventListener("error", function(event) {
    emit("error", [event.message || "Script error", event.filename || "", event.lineno || ""]);
  });
  window.addEventListener("unhandledrejection", function(event) {
    emit("unhandledrejection", [event.reason || "Unhandled promise rejection"]);
  });
})();
</script>
<script>
/* 自适应高度：内容多高 iframe 就多高，消除滚动条 */
(function(){function fit(){try{var fe=window.frameElement;if(!fe)return;var h=Math.max(document.body.scrollHeight,document.documentElement.scrollHeight);if(h<50)return;var c=parseInt(fe.style.height)||0;if(Math.abs(c-h)<2)return;fe.style.height=h+'px';var p=fe.parentElement;if(p){p.style.height=h+'px';p.style.maxHeight='none';}}catch(e){}}window.addEventListener('load',fit);document.addEventListener('DOMContentLoaded',fit);if(window.ResizeObserver){new ResizeObserver(fit).observe(document.body);}document.addEventListener('click',function(){setTimeout(fit,60);});setTimeout(fit,100);})();
</script>
</body>
</html>
